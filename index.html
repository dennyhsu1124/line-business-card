<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>立騰室內裝修設計 | 徐睿靖</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
      background: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card-wrap {
      width: 100%;
      max-width: 380px;
      animation: fadeUp .6s ease-out both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Card shell ─────────────────────────────── */
    .card {
      background: linear-gradient(160deg, #232323 0%, #1a1a1a 100%);
      border: 1px solid rgba(212,175,55,.2);
      border-radius: 18px;
      padding: 0 0 28px;
      box-shadow:
        0 24px 64px rgba(0,0,0,.55),
        inset 0 1px 0 rgba(212,175,55,.18);
      position: relative;
      overflow: hidden;
    }

    /* ── Hero image ─────────────────────────────── */
    .hero {
      position: relative;
      width: 100%;
      height: 200px;
      overflow: hidden;
      border-radius: 18px 18px 0 0;
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 30%;
      display: block;
    }

    .hero::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 80px;
      background: linear-gradient(to bottom, transparent, #1a1a1a);
    }

    .card-body {
      padding: 20px 26px 0;
    }

    /* top shimmer line */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #d4af37, transparent);
      border-radius: 2px;
    }

    /* corner ornament */
    .card::after {
      content: '';
      position: absolute;
      bottom: -40px; right: -40px;
      width: 120px; height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212,175,55,.06) 0%, transparent 70%);
    }

    /* ── Brand ──────────────────────────────────── */
    .brand { text-align: center; margin-bottom: 20px; }

    .brand-zh {
      font-size: 21px;
      font-weight: 700;
      color: #d4af37;
      letter-spacing: 5px;
      line-height: 1.3;
    }

    .brand-en {
      font-size: 10px;
      color: #666;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ── Dividers ───────────────────────────────── */
    .divider-center {
      width: 56px; height: 1px;
      background: linear-gradient(90deg, transparent, #d4af37, transparent);
      margin: 16px auto;
    }

    .divider-full {
      width: 100%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,175,55,.3), transparent);
      margin: 18px 0;
    }

    /* ── Person ─────────────────────────────────── */
    .person { text-align: center; margin-bottom: 4px; }

    .person-name {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 7px;
    }

    .person-title {
      font-size: 12px;
      color: #d4af37;
      letter-spacing: 4px;
      margin-top: 6px;
    }

    /* ── Contact list ───────────────────────────── */
    .contacts { margin-bottom: 22px; }

    .contact-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 11px;
    }

    .c-icon {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: rgba(212,175,55,.08);
      border: 1px solid rgba(212,175,55,.25);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .c-icon svg { width: 16px; height: 16px; fill: #d4af37; }

    .c-text { flex: 1; font-size: 13.5px; color: #ccc; }
    .c-text a { color: #ccc; text-decoration: none; }

    .rating {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(212,175,55,.1);
      border: 1px solid rgba(212,175,55,.28);
      border-radius: 20px;
      padding: 3px 11px;
      font-size: 12px;
      color: #d4af37;
    }

    /* ── Action grid ────────────────────────────── */
    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      margin-bottom: 11px;
    }

    .act-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 14px 8px;
      border-radius: 11px;
      border: 1px solid rgba(212,175,55,.28);
      background: rgba(212,175,55,.05);
      cursor: pointer;
      text-decoration: none;
      color: #d4af37;
      font-size: 12px;
      font-family: inherit;
      transition: background .18s, transform .12s;
      -webkit-tap-highlight-color: transparent;
    }

    .act-btn:active { background: rgba(212,175,55,.15); transform: scale(.97); }
    .act-btn svg { width: 22px; height: 22px; fill: #d4af37; }

    /* LINE button green tint */
    .act-btn.line-oa {
      border-color: rgba(0,195,60,.3);
      background: rgba(0,195,60,.06);
      color: #00c33c;
    }
    .act-btn.line-oa svg { fill: #00c33c; }
    .act-btn.line-oa:active { background: rgba(0,195,60,.16); }

    /* Facebook button blue tint */
    .act-btn.facebook {
      grid-column: 1 / -1;
      flex-direction: row;
      gap: 10px;
      padding: 14px 16px;
      border-color: rgba(24,119,242,.35);
      background: rgba(24,119,242,.07);
      color: #5b9bf8;
    }
    .act-btn.facebook svg { fill: #5b9bf8; width: 20px; height: 20px; }
    .act-btn.facebook:active { background: rgba(24,119,242,.18); }

    /* ── Share & Save buttons ───────────────────── */
    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
    }

    .share-btn, .save-btn {
      padding: 15px 8px;
      border-radius: 11px;
      border: none;
      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: 1px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: filter .18s, transform .12s;
      -webkit-tap-highlight-color: transparent;
    }

    .share-btn {
      background: linear-gradient(135deg, #b89000, #d4af37);
      color: #1a1a1a;
    }
    .share-btn svg { fill: #1a1a1a; }

    .save-btn {
      background: rgba(212,175,55,.1);
      border: 1px solid rgba(212,175,55,.3);
      color: #d4af37;
    }
    .save-btn svg { fill: #d4af37; }

    .share-btn:active, .save-btn:active {
      filter: brightness(.93);
      transform: scale(.97);
    }

    .share-btn svg, .save-btn svg { width: 18px; height: 18px; }

    /* ── Footer ─────────────────────────────────── */
    .footer {
      text-align: center;
      margin-top: 14px;
      color: #444;
      font-size: 11px;
      letter-spacing: 1px;
    }

    /* ── Toast ──────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(14px);
      background: #2a2a2a;
      color: #d4af37;
      padding: 10px 22px;
      border-radius: 22px;
      font-size: 13px;
      border: 1px solid rgba(212,175,55,.3);
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s, transform .25s;
      z-index: 999;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
